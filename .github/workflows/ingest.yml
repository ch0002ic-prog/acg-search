name: Prototype Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ingestion
        run: python scripts/ingest_news.py
      - name: Export deploy snapshots
        run: python scripts/export_deploy_snapshot.py --limit 60
      - name: Commit refreshed deploy snapshots
        run: |
          if git diff --quiet -- data/deploy_articles.json data/deploy_source_health.json; then
            echo "No deploy snapshot changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deploy_articles.json data/deploy_source_health.json
          git commit -m "Refresh deploy bootstrap snapshot"
          git push origin HEAD:main
      - name: Upload prototype data artifact
        uses: actions/upload-artifact@v4
        with:
          name: acg-search-data
          path: |
            data/articles.db
            data/vector-store
            data/deploy_articles.json
            data/deploy_source_health.json
          if-no-files-found: warn
